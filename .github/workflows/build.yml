name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'          # also fires on version tags like v5.0.0
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Check out the repo ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Build the EXE with PyInstaller ─────────────────────────────────
      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "LVTTileCutter" `
            --collect-data gooey `
            --hidden-import six `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageCms `
            --hidden-import wx `
            lvtcutgui5.py

      # ── 5. Confirm the build produced a file ─────────────────────────────
      - name: Verify build output
        run: |
          if (!(Test-Path "dist\LVTTileCutter.exe")) {
            Write-Error "EXE not found — build failed"
            exit 1
          }
          Write-Host "Build OK: dist\LVTTileCutter.exe"
          Get-Item "dist\LVTTileCutter.exe" | Select-Object Name, Length, LastWriteTime

      # ── 6. Upload the EXE as a downloadable artifact ─────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: LVTTileCutter-windows
          path: dist\LVTTileCutter.exe
          retention-days: 30

      # ── 7. Attach EXE to a GitHub Release (tag pushes only) ──────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: dist\LVTTileCutter.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
